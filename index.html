<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🇮🇹 意大利之旅 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --terracotta: #C0533A;
    --gold: #C9A84C;
    --cream: #F7F0E6;
    --deep: #2C1A0E;
    --olive: #6B7C45;
    --sky: #4A7FA5;
    --light-terra: #E8896E;
    --parchment: #F2E8D5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--deep);
    color: var(--deep);
    height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── 封面 ── */
  #cover {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #1a0a04 0%, #3d1c0a 40%, #6b3a1f 70%, #c0533a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.8s, transform 0.8s;
  }
  #cover.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

  .cover-ornament {
    font-size: 64px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    color: var(--gold);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.2;
  }
  .cover-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--cream);
    font-size: 18px;
    margin-top: 8px;
    opacity: 0.85;
  }
  .cover-dates {
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 3px;
    margin-top: 20px;
    opacity: 0.9;
  }
  .cover-divider {
    width: 120px;
    height: 1px;
    background: var(--gold);
    margin: 24px auto;
    opacity: 0.6;
  }
  .cover-btn {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 12px 32px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .cover-btn:active { background: var(--gold); color: var(--deep); }

  .cover-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    margin-top: 32px;
    text-align: center;
    padding: 0 40px;
    line-height: 1.8;
  }

  /* ── 主界面 ── */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--parchment);
  }

  /* 顶部导航栏 */
  .topbar {
    background: linear-gradient(135deg, var(--terracotta), #8B2E15);
    padding: 8px 18px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    padding-top: max(8px, env(safe-area-inset-top));
  }
  .topbar-title {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 15px;
    letter-spacing: 1px;
  }
  .topbar-flag { font-size: 18px; }
  .day-counter {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* 日期导航胶囊 */
  .date-nav {
    background: var(--deep);
    padding: 6px 0;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .date-nav::-webkit-scrollbar { display: none; }
  .date-nav-inner {
    display: flex;
    gap: 6px;
    padding: 0 14px;
    width: max-content;
  }
  .date-chip {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .date-chip.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--deep);
    font-weight: 700;
  }
  .date-chip:active { opacity: 0.7; }

  /* 卡片容器 */
  .cards-wrapper {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .cards-track {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }
  .card {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px 24px;
  }

  /* 卡片内容块 */
  .day-header {
    text-align: center;
    padding: 20px 0 16px;
    border-bottom: 1px solid rgba(192,83,58,0.2);
    margin-bottom: 16px;
  }
  .day-number {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--terracotta);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .day-date {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--deep);
    margin: 4px 0;
  }
  .day-location {
    font-size: 13px;
    color: var(--olive);
    letter-spacing: 2px;
  }
  .day-emoji { font-size: 32px; margin-bottom: 6px; }

  /* 信息块 */
  .section {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .section-header {
    background: linear-gradient(135deg, var(--terracotta), #8B2E15);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header.gold { background: linear-gradient(135deg, #8B7335, var(--gold)); }
  .section-header.olive { background: linear-gradient(135deg, #4A5C2A, var(--olive)); }
  .section-header.sky { background: linear-gradient(135deg, #2A5A7A, var(--sky)); }
  .section-header.purple { background: linear-gradient(135deg, #5A2A7A, #8B5CB5); }

  .section-title {
    color: white;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .section-icon { font-size: 16px; }

  .section-body { padding: 14px 16px; }

  /* 航班卡 */
  .flight-card {
    background: var(--cream);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    border-left: 3px solid var(--terracotta);
  }
  .flight-card:last-child { margin-bottom: 0; }
  .flight-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .flight-time {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--deep);
    font-weight: 700;
  }
  .flight-arrow { color: var(--terracotta); font-size: 20px; flex: 1; text-align: center; }
  .flight-city { font-size: 12px; color: #666; margin-top: 2px; }
  .flight-info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(0,0,0,0.1);
  }
  .flight-badge {
    background: var(--terracotta);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .flight-note { font-size: 11px; color: #888; align-self: center; }

  /* 行程列表 */
  .itinerary-item {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    align-items: flex-start;
  }
  .itinerary-item:last-child { border-bottom: none; }
  .item-time {
    font-size: 12px;
    color: var(--terracotta);
    font-weight: 700;
    width: 40px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
    margin-top: 5px;
  }
  .item-content { flex: 1; }
  .item-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--deep);
    margin-bottom: 2px;
  }
  .item-desc { font-size: 12px; color: #777; line-height: 1.5; }
  .item-preview {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 8px;
    display: block;
    background: var(--cream);
  }
  /* 关键时间节点高亮 */
  .itinerary-item.critical-item {
    background: linear-gradient(90deg, rgba(192,83,58,0.06), transparent);
    margin: 4px -8px;
    padding: 4px 8px;
    border-radius: 8px;
    border-left: 3px solid var(--terracotta);
  }
  .item-time.critical {
    color: white;
    background: var(--terracotta);
    font-size: 13px;
    padding: 3px 6px;
    border-radius: 6px;
    text-align: center;
    line-height: 1.3;
    font-weight: 800;
    box-shadow: 0 1px 4px rgba(192,83,58,0.4);
  }
  .item-dot.critical {
    background: var(--terracotta);
    width: 10px; height: 10px;
    margin-top: 4px;
    box-shadow: 0 0 0 3px rgba(192,83,58,0.2);
  }
  .critical-alert {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--terracotta);
    background: rgba(192,83,58,0.1);
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }
  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--sky);
    text-decoration: none;
    font-weight: 700;
    border: 1px solid var(--sky);
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(74,127,165,0.06);
  }
  .map-link:active { background: rgba(74,127,165,0.2); }

  /* 小贴士 */
  .tip-box {
    background: linear-gradient(135deg, #FFF8E7, #FFF3D4);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid var(--gold);
    display: flex;
    gap: 10px;
  }
  .tip-icon { font-size: 18px; flex-shrink: 0; }
  .tip-text { font-size: 12px; color: #5A4A2A; line-height: 1.6; }
  .tip-text strong { color: var(--terracotta); }

  /* 餐厅/住宿 */
  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
  .info-main { flex: 1; }
  .info-name { font-size: 13px; font-weight: 700; color: var(--deep); }
  .info-sub { font-size: 11px; color: #999; margin-top: 1px; }
  .info-tag {
    font-size: 10px;
    background: var(--cream);
    color: var(--terracotta);
    border: 1px solid var(--terracotta);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }

  /* 地图按钮 */
  .map-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--sky);
    color: white;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* 底部导航 */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--deep);
    display: flex;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
    z-index: 50;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 0 3px;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    transition: color 0.2s;
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
  }
  .nav-btn:active { opacity: 0.6; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn-icon { font-size: 16px; margin-bottom: 1px; }
  .nav-btn-label { font-size: 9px; letter-spacing: 0.5px; }

  /* 进度条 */
  .progress-bar {
    height: 2px;
    background: rgba(255,255,255,0.1);
    position: relative;
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.35s ease;
    border-radius: 1px;
  }

  /* 顾问标签 */
  .guide-note {
    background: linear-gradient(135deg, #1a0a04, #3d1c0a);
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    text-align: center;
    padding: 12px 20px;
    border-radius: 10px;
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* 待定标签 */
  .tbd-badge {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border: 1px dashed var(--gold);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
  }

  /* 标签 */
  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: 4px;
    margin-top: 4px;
    font-weight: 700;
  }
  .tag-red { background: rgba(192,83,58,0.15); color: var(--terracotta); }
  .tag-green { background: rgba(107,124,69,0.15); color: var(--olive); }
  .tag-blue { background: rgba(74,127,165,0.15); color: var(--sky); }

  /* 空白占位 */
  .empty-note {
    text-align: center;
    padding: 24px 20px;
    color: #bbb;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.8;
  }

  /* 过渡动画 */
  .card { scroll-behavior: smooth; }
</style>
</head>
<body>

<!-- ══ 封面 ══ -->
<div id="cover">
  <div class="cover-ornament">🏛️</div>
  <div class="cover-title">ITALIA</div>
  <div class="cover-sub">意大利·慢旅</div>
  <div class="cover-divider"></div>
  <div class="cover-dates">OCT 03 — OCT 12, 2025</div>
  <div class="cover-dates" style="margin-top:6px;font-size:12px;opacity:0.6;">南京 → 罗马 → 佛罗伦萨 → 米兰</div>

  <button class="cover-btn" id="coverBtn">开始旅程 ✦</button>
  <div class="cover-quote">
    "Italia, il paese dove anche il caffè<br>è una poesia."<br>
    <span style="font-size:11px;opacity:0.6;">意大利，连咖啡都是一首诗</span>

<!-- ══ 主应用 ══ -->
<div id="app">
  <!-- 顶部栏 -->
  <div class="topbar">
    <div>

      <div class="day-counter" id="dayCounter">第 1 天 / 共 12 天</div>

    <div class="topbar-flag">✈️</div>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:8.3%"></div>
  </div>

  <!-- 日期导航 -->
  <div class="date-nav">
    <div class="date-nav-inner" id="dateNav"></div>
  </div>

  <!-- 卡片区域 -->
  <div class="cards-wrapper" id="cardsWrapper">
    <div class="cards-track" id="cardsTrack"></div>
  </div>

  <!-- 底部导航已移除（改用左右滑动 + 顶部日期胶囊切换） -->

</div>

// ══ 渲染函数 ══
let currentDay = 0;
let startX = 0, startY = 0, isDragging = false;

function renderFlights(section) {
  return section.flights.map(f => `
    <div class="flight-card">
      <div class="flight-row">
        <div>
          <div class="flight-time">${f.from}</div>
          <div class="flight-city">${f.fromCity}</div>
        </div>
        <div class="flight-arrow">✈ ─ ─</div>
        <div style="text-align:right">
          <div class="flight-time">${f.to}</div>
          <div class="flight-city">${f.toCity}</div>
        </div>
      </div>
      <div class="flight-info">
        <span class="flight-badge">${f.flight}</span>
        <span class="flight-note">${f.note}</span>
      </div>
    </div>
  `).join('');
}

function renderTips(section) {
  return section.tips.map(t => `
    <div class="tip-box">
      <div class="tip-icon">${t.icon}</div>
      <div class="tip-text">${t.text}</div>
    </div>
  `).join('');
}

function renderItinerary(section) {
  return section.items.map(item => {
    // 提取地点用于地图搜索（去掉emoji和括号内的中文说明）
    let place = item.mapName || item.name.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]/gu, '').trim();
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place + ' Italia')}`;
    // 精确时间（HH:MM 格式）= 关键节点，需重点提醒
    const isCritical = /\d{1,2}:\d{2}/.test(item.time);
    const timeClass = isCritical ? 'item-time critical' : 'item-time';
    const dotClass = isCritical ? 'item-dot critical' : 'item-dot';
    const criticalAlert = isCritical ? '<div class="critical-alert">⏰ 关键时间 · 请勿错过</div>' : '';
    // 景点预览图（如有配图地址）
    const preview = item.img ? `<img class="item-preview" src="${item.img}" alt="${place}" loading="lazy" onerror="this.style.display='none'">` : '';
    return `
    <div class="itinerary-item ${isCritical ? 'critical-item' : ''}">
      <div class="${timeClass}">${item.time}</div>
      <div class="${dotClass}"></div>
      <div class="item-content">
        ${preview}
        <div class="item-name">${item.name}${item.tag ? `<span class="tbd-badge">${item.tag}</span>` : ''}</div>
        <div class="item-desc">${item.desc}</div>
        ${criticalAlert}
        <a class="map-link" href="${mapUrl}" target="_blank">📍 在地图中查看 / 导航</a>
      </div>
    </div>
  `;}).join('');
}

function renderSection(section) {
  let body = '';
  if (section.type === 'flights') body = renderFlights(section);
  else if (section.type === 'tips') body = renderTips(section);
  else if (section.type === 'itinerary') body = renderItinerary(section);

  return `
    <div class="section">
      <div class="section-header ${section.style}">
        <div class="section-title">${section.header}</div>
      </div>
      <div class="section-body">${body}</div>
    </div>
  `;
}

function renderCard(d) {
  const sections = d.sections.map(renderSection).join('');
  return `
    <div class="card">
      <div class="day-header">
        <div class="day-emoji">${d.emoji}</div>
        <div class="day-number">第 ${d.day} 天 · ${d.weekday}</div>
        <div class="day-date">${d.date}</div>
        <div class="day-location">${d.location}</div>
      </div>
      <div class="guide-note">${d.guide}</div>
      ${sections}
    </div>
  `;
}

function init() {
  const track = document.getElementById('cardsTrack');
  const nav = document.getElementById('dateNav');

  days.forEach((d, i) => {
    track.innerHTML += renderCard(d);
    nav.innerHTML += `<div class="date-chip ${i===0?'active':''}" onclick="goTo(${i})">${d.date.replace('月','/')}${d.emoji}</div>`;
  });

  updateUI();
  setupSwipe();
}

function goTo(idx) {
  if (idx < 0 || idx >= days.length) return;
  currentDay = idx;
  updateUI();
}

function updateUI() {
  const track = document.getElementById('cardsTrack');
  track.style.transform = `translateX(-${currentDay * 100}%)`;

  document.querySelectorAll('.date-chip').forEach((c, i) => {
    c.classList.toggle('active', i === currentDay);
    if (i === currentDay) c.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  });

  document.getElementById('dayCounter').textContent = `第 ${days[currentDay].day} 天 / 共 ${days.length} 天`;
  document.getElementById('progressFill').style.width = `${(currentDay + 1) / days.length * 100}%`;

  document.getElementById('navPrev').classList.toggle('active', currentDay > 0);
  document.getElementById('navNext').classList.toggle('active', currentDay < days.length - 1);
}

function setupSwipe() {
  const wrapper = document.getElementById('cardsWrapper');
  wrapper.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  wrapper.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!isDragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
      isDragging = true;
    }
    if (isDragging) e.preventDefault();
  }, { passive: false });

  wrapper.addEventListener('touchend', e => {
    if (!isDragging) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (dx < -50) goTo(currentDay + 1);
    else if (dx > 50) goTo(currentDay - 1);
    isDragging = false;
  });
}

function enterApp() {
  document.getElementById('cover').classList.add('hidden');
  setTimeout(() => document.getElementById('cover').style.display = 'none', 800);
}

function showCover() {
  const cover = document.getElementById('cover');
  cover.style.display = 'flex';
  cover.style.opacity = '0';
  cover.style.transform = 'scale(1.05)';
  setTimeout(() => {
    cover.classList.remove('hidden');
    cover.style.opacity = '';
    cover.style.transform = '';
  }, 10);
}

// 启动
init();

// 封面进入：自动 + 点击/触摸/键盘 兜底，确保任何环境都能进入
(function setupCover() {
  var cover = document.getElementById('cover');
  if (!cover) return;
  function hideCover() { cover.style.display = 'none'; }
  // 1) 任意鼠标点击、触摸、键盘都能关闭
  ['click', 'touchend', 'touchstart', 'mousedown'].forEach(function(evt) {
    document.addEventListener(evt, hideCover, { once: true, passive: true });
  });
  // 2) 兜底：2秒后自动关闭，避免卡在封面
  setTimeout(hideCover, 2000);
})();
</script>
